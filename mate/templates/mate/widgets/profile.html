{% load user_filters %}

<section class="widget">
    <h3>
        <img
            class="circle-24"
            src="{{ request.user|profile_picture_url }}"
            alt="{{ request.user.username }}'s profile picture"
        />
        <span class="text-transform-none">{{ request.user.username }}</span>
    </h3>
    <section class="flex-container">
        {% include "mate/card/js/form/info.html" %}
        {% include "mate/card/js/form/picture.html" %}
    </section>
</section>
