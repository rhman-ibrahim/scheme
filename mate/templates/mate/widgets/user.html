{% load filters %}
<section class="widget" id="team-navigate-widget">
    <h3>
        <i class="material-icons">group</i>
        <span class="text-transform-none">{{ request.user.username }} & {{ mate.username }}</span>
    </h3>
    <div class="notes">
        <div class="note info-note">
            <p>
                <span>You are friends with <mark><b>{{ mate.username }}</b></mark>
                since {{ friendship.created|date:"j/m/Y H:i A" }},
                {{ friendship.created|ago }}.
            </p>
        </div>
        <div class="note info-note">
            <p><b>Post</b></p>
            <nav>
                <i class="material-icons">bubble_chart</i>
            </nav>
        </div>
        <div class="note info-note">
            <p><b>Chat</b></p>
            <nav>
                <i class="material-icons" onclick="Fixed.open('#room-chat-form')">forum</i>
            </nav>
        </div>
        <div class="note info-note">
            <p><b>Go</b> back to your account.</p>
            <nav>
                <a href="{% url 'user:retrieve_account' %}">
                    <i class="material-icons">person</i>
                </a>
            </nav>
        </div>
    </div>
</section>
<section class="widget">
    <h3>
        <i class="material-icons">shield</i>
        <span>secuirty</span>
    </h3>
    <section class="notes">
        <div class="note info-note">
            <nav>
                <i class="material-icons">close</i>
            </nav>
        </div>
    </section>
</section>
