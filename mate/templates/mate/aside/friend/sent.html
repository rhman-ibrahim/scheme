{% load filters %}
<aside id="friend-sent-requests-aside">
    <div class="column">
        <button type="button" class="material-icons column-button" onclick="Fixed.clear()">close</button>
        <section class="widget">
            {% if request.user.profile.requests.friend.sent.count %}
            {% for freq in request.user.profile.requests.friend.sent.all %}
            <div class="note info-note">
                <p>To <mark><b class="text-transform-none">{{ freq.receiver.username }}</b></mark> {{ freq.created|ago }}</p>
                <p>{{ freq.message}}</p>
                <nav>
                    <a href="{% url 'mate:delete_friend_request' freq.id %}">
                        <i class="material-icons">close</i>
                    </a>
                </nav>
            </div>
            {% endfor %}
            {% else %}
            <div class="note info-note">
                <p class="text-align-center">You have no sent requests.</p>
            </div>
            {% endif %}
        </section>
    </div>
</aside>
