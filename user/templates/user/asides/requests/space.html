{% load filters %}
<aside id="sent-space-requests-aside">
    <div class="column">
        <button type="button" onclick="Fixed.clear()" class="material-icons column-button">close</button>
        <section class="widget">
            {% if request.user.profile.requests.space.count %}
            <table>
            {% for sreq in request.user.profile.requests.space.all %}
                <tr>
                    <td>
                        <b class="text-transform-none">{{ sreq.space.name }}</b>
                    </td>
                    <td>
                        <a href="{% url 'mate:delete_space_request' sreq.id %}" class="material-icons">close</a>
                    </td>
                </tr>
            {% endfor %}
            </table>
            {% else %}
            <div class="note">
                <p class="text-align-center">You have no sent requests.</p>
            </div>
            {% endif %}
        </section>
    </div>
</aside>
