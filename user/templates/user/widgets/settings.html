<section class="widget" id="user-security-widget">
    <h3 class="text-capitalize">
        <i class="material-icons">settings</i>
    </h3>
    <section class="notes">
        <div class="note info-note">
            <p><b>Refresh</b> your account token, do not share it and store it safe.</p>
            <nav>
                <a href="{% url 'note:update_token' %}">
                    <i class="material-symbols-outlined">token</i>
                </a>
            </nav>
        </div>
        <div class="note info-note">
            <p><b>Update</b> your password regularly, at least every three (3) months.</p>
            <nav>
                <i class="material-symbols-outlined" onclick="Fixed.open('#password-form')">lock_reset</i>
            </nav>
        </div>
        <div class="note danger-note">
            <p><b>Delete</b> your account now, also circles, signals, tasks and polls.</p>
            <nav>
                <i class="material-icons" onclick="Fixed.open('#account-delete-form')">person_remove</i>
            </nav>
        </div>
    </section>
</section>
