<section class="widget" id="user-security-widget">
    <h2 class="text-capitalize">
        <i class="material-icons">settings</i>
        <span>settings</span>
    </h2>
    <section class="notes">
        <div class="note info-note">
            <p><mark><b>Update your password</b></mark> regularly, at least every three (3) months.</p>
            <nav>
                <i class="material-symbols-outlined" onclick="Fixed.open('#password-form')">lock_reset</i>
            </nav>
        </div>
        <div class="note info-note">
            <p><mark><b>Update your profile</b></mark> info:
            name, email and bio (<b>optional</b>).</p>
            <nav class="text-align-right">
                <i class="material-icons" onclick="Fixed.open('#info-form')">edit</i>
            </nav>
        </div>
        <div class="note danger-note">
            <p><mark><b>Delete</b></mark> your account, spaces and signals immediately now.</p>
            <nav>
                <i class="material-icons" onclick="Fixed.open('#account-delete-form')">person_remove</i>
            </nav>
        </div>
    </section>
</section>
