<section class="widget">
    <h3>
        <i class="material-icons">assignment_ind</i>
        <span>profile</span>
    </h3>
    <section class="notes">
        <div class="note info-note">
            <p><mark><b>Update your profile</b></mark> info:
                name, email and bio (<b>optional</b>).</p>
            <nav class="text-align-right">
                <i class="material-symbols-outlined" onclick="Fixed.open('#info-form')">edit</i>
            </nav>
        </div>
        <div class="note info-note">
            <p><mark><b>Share</b></mark> your username,
            so other users can send you friend requests.</p>
            <nav>
                <i
                    class="material-icons"
                    onclick="Template.copyToClipboard(this)"
                    data-clipboard="{{ request.user.username }}">content_copy</i>
            </nav>
        </div>
        <div class="note info-note">
            <p><mark><b>Sign-out</b></mark> now to meditate,
            having a rest is good for your health.</p>
            <nav>
                <a href="{% url 'user:signout' %}">
                    <i class="material-icons">logout</i>
                </a>
            </nav>
        </div>
    </section>
</section>
