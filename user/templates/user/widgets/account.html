<section class="widget">
    <h3>
        <i class="material-icons">person</i>
        <span class="text-transform-none">{{ request.user.username }}</span>
    </h3>
    <section class="notes">
        <div class="note info-note">
            <p><mark><b>View</b></mark> a list of your friends, there is
            <b>a space for you and each friend you have
            to post and chat privately</b>.</p>
            <nav>
                <i class="material-icons" onclick="Fixed.open('#friends-aside')">groups</i>
            </nav>
        </div>
        <div class="note info-note">
            <p><mark><b>View</b></mark> a list of all the circles
            you are connected to as a founder and as a member.</p>
            <nav>
                <i class="material-icons" onclick="Fixed.open('#spaces-aside')">diversity_2</i>
            </nav>
        </div>
    </section>
</section>
