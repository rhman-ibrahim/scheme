<div class="card" role="function">
    <h3 class="title">
        <img src="{{ request.user.profile.picture.url }}" class="circle-24" alt="{{ request.user.username }}'s profile picture" id="picture">
        <span>Welcome!, <b>{{ request.user.username }}</b></span>
    </h3>
    <p>This is your account settings page, here you view your logs,
    download token, update profile information and manage applications.</p>
    <nav class="end">
        <a class="material-icons" href="{% url 'user:signout' %}">logout</a>
    </nav>
</div>
