<div class="card" role="describe">
    <h3 class="text-capitalize">
        <i class="material-symbols-outlined">how_to_reg</i>
        <b>Welcome, {{ user.username }}</b>
    </h3>
    <p>Congratulations, Your account has been <b>identified successfully</b>.
    You have used your QR token to verify your account successfully.</p>
    <nav class="end">
        <img class="circle-24" src="{{ user.profile.picture.url }}" alt="{{ user.username }}'s profile picture" id="picture">
    </nav>
</div>
