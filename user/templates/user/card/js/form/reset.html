<div class="flex-box-col warning-card">
    <p><b>Cancel</b> the password resetting, or set a new password.</p>
    <nav class="text-align-right">
        <a href="{% url 'home:cancel' %}" class="material-icons">close</a>
    </nav>
</div>
<div class="flex-box-col info-card">
    <p><b>Your token has been verified</b>, set a new password for your account.</p>
    <nav class="text-align-right">
        <i  class="material-symbols-outlined" onclick="Fixed.open('#reset-form')">lock_reset</i>
    </nav>
</div>
