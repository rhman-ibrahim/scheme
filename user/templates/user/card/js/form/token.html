{% if 'token' in request.session %}
<div class="flex-box-col info-card">
    <p>Protect your account by using password of at least 8 characters.</p>
    <nav class="text-align-right">
        <i  class="material-symbols-outlined" onclick="Fixed.open('#reset-form-footer')">edit_square</i>
    </nav>
</div>
{% else %}
<div class="flex-box-col info-card">
    <p><b>Upload</b> your QR code recovery token now, and reset your password.</p>
    <nav class="text-align-right">
        <i class="material-symbols-outlined" onclick="Fixed.open('#verify-form-footer')">upload</i>
    </nav>
</div>
{% endif %}
