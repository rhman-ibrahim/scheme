<aside id="friends-aside">
    <div class="column">
        <button type="button" class="material-icons column-button" onclick="Fixed.clear()">close</button>
        <section class="widget">
            {% if request.user.profile.friends.count %}
            {% for friend in request.user.profile.friends.all %}
            <div class="note info-note">
                <mark><b class="text-transform-none">{{ friend.user.username }}</b></mark>
                <nav>
                    <a href="{{ friend.index }}">
                        <i class="material-icons">link</i>
                    </a>
                </nav>
            </div>
            {% endfor %}
            {% else %}
            <div class="note info-note">
                <p class="text-align-center">You have no sent connections.</p>
            </div>
            {% endif %}
        </section>
    </div>
</aside>
