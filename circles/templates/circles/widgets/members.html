{% load user_filters %}

{% if circle.members.count %}
<section class="widget" id="members">
    <h3 class="title">
        <i class="material-icons">group</i>
        <span>members ({{ circle.members.count }})</span>
    </h3>
    <div class="cards-w">
        {% for member in circle.members.all %}
        <div class="card center">
            <img src="{{ member|profile_picture_url }}" alt="" class="circle-48">
            <h4>{{ member.username }}</h4>
            <nav>
                <a href="{% url 'circles:remove' opened_circle.uuid member.id %}">remove</a>
            </nav>
        </div>
        {% endfor %}
    </div>
</section>
{% endif %}
