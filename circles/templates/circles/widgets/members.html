{% load user_filters %}
{% if circle.members.count %}
<section class="cards-w">
    {% for member in circle.members.all %}
    <div class="card" role="navigate">
        <img src="{{ member|profile_picture_url }}" alt="" class="circle-48">
        <h4>{{ member.username }}</h4>
        <nav>
            <a href="{% url 'circcleremove' opened_circle.uuid member.id %}">remove</a>
        </nav>
    </div>
    {% endfor %}
</section>
{% endif %}
