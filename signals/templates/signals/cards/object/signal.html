{% load user_filters %}
{% load filters %}

<div class="card">
    <div class="end">
        <small>{{ signal.created|ago_shorten }}</small>
    </div>
    <h4 class="title">
        <img class="circle-24" src="{{ signal.user|profile_picture_url }}">
        <span>{{ signal.user.username }}</span>
    </h4>
    <p>{{ signal.body }}</p>
    <div class="end">
        <a href="{{ signal.url }}">
            <i class="material-symbols-outlined">{{ signal.icon }}</i>
        </a>
    </div>
</div>
