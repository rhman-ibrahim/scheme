    <p><b>Respond</b> to received circle invitations, <span>sent by</span> circle founders.</p>

        <li class="material-icons">rule</li>

</div>
{% elif request.resolver_match.app_name == "team" and request.user == circle.founder %}

    <ul class="text-align-right">
        <li class="material-icons">menu</li>
    </ul>
</div>
{% endif %}
