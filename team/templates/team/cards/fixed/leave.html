<div class="card danger" role="function">
    {% if request.user == circle.founder %}
    <p>Delete the circle and delete its content, <mark>this cannot be undone</mark>.</p>
    {% else %}
    <p>Leave the circle and delete your content, <mark>this cannot be undone</mark>.</p>
    {% endif %}
    <nav class="end">
        <button onclick="Aside.open('#circle-delete-or-leave-footer')">open</button>
    </nav>
</div>
