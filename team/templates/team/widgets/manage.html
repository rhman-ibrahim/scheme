        <i class="material-icons">admin_panel_settings</i>

    </h3>

            <p><b>Update</b> the circle's profile info, make sure to keep it specific.</p>
            <nav>
                <i class="material-icons" onclick="Fixed.open('#space-update-form')">edit_square</i>
            </nav>

            <nav>
                <i class="material-icons" onclick="Fixed.open('#requests-aside')">mark_email_unread</i>
