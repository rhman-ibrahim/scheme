<aside id="circles-aside">
    <div class="column">
        <button
            type="button"
            class="material-icons column-button"
            onclick="Fixed.clear()">close</button>
        <section class="widget">
            <section class="notes">
                {% if request.user.profile.circles.all %}
                {% for circle in request.user.profile.circles.all %}
                <nav class="flex-box-row">
                    <h3 class="text-transform-none">{{ circle.name }}</h3>
                    {% if opened_circle.id == circle.id %}
                    <a href="{% url 'team:retrieve_team_index' %}" class="text-align-right info-color">
                        <b class="material-icons">diversity_2</b>
                    </a>
                    {% else %}
                    <h3 class="text-align-right">
                        <i class="material-icons" onclick="Fixed.CircleLoginForm('{{ circle.name }}')">login</i>
                    </h3>
                    {% endif %}
                </nav>
                {% endfor %}
                {% endif %}
            </section>
        </section>
    </div>
</aside>
