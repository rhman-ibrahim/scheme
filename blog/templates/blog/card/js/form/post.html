<div class="flex-box-col accent-card">
    {% if request.resolver_match.app_name == "team" %}
    <p><b>Post and start a new discussion</b> about what you have on your mind.</p>
    {% elif request.resolver_match.app_name == "blog" %}
    <p><b>Connect</b> another signal to this one to create a chained beam of signals.</p>
    {% endif %}
    <nav class="text-align-right">
        <i class="material-icons" onclick="Fixed.open('#post-form')">format_quote</i>
    </nav>
</div>
