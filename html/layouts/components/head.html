{% load static %}
{% load filters %}

<meta charset="UTF-8"/>
<meta http-equiv="X-UA-Compatible" content="IE=edge"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="icon" type="image/png" sizes="48x48" href="{% static 'favicon/48.png' %}">
<link rel="apple-touch-icon" sizes="180x180" href="{% static 'favicon/180.png' %}">
<link rel="apple-touch-icon-precomposed" sizes="180x180" href="{% static 'favicon/180.png' %}">
<link rel="shortcut icon" type="image/png" sizes="16x16" href="{% static 'favicon/16.png' %}">
<link rel="manifest" href="{% static 'favicon/site.webmanifest' %}">

<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"/>

<link rel="stylesheet" href="{% static 'css/init.css' %}?v={% now "U" %}"/>
<link rel="stylesheet" type="text/css" href="{% get_static_prefix %}{{ request.resolver_match.app_name }}/css/master.css?v={% now "U" %}"/>
<link rel="stylesheet" href="{% static 'css/rule.css' %}?v={% now "U" %}" id="rules" />

<script src="{% static 'js/master.js' %}?v={% now "U" %}" defer></script>
<script src="{% get_static_prefix %}{{ request.resolver_match.app_name }}/js/master.js" defer></script>

<title>{{ request.resolver_match.app_name|capfirst }} | {{ request.resolver_match.url_name|replace_underscores }}</title>
