{% load filters %}
<!DOCTYPE html>
<html lang="en">
<head>
    {% include "components/head.html" %}
    {% block head %}
    {% endblock head %}
</head>
<body onload="Handler.init();" onresize="Handler.init();" data-app="{{ request.resolver_match.app_name }}" data-url="{{ request.resolver_match.url_name }}">
    {% include "components/messages.html" %}
    {% block fixed %}
    {% endblock %}
    <main class="lr-grid">
        <aside id="left">
            <div class="wrapper">
                <button class="pin material-symbols-outlined" type="button" onclick="Aside.open('#right')" id="right-pin">chevron_left</button>
                {% block left %}
                {% endblock %}
            </div>
        </aside>
        <aside class="aside-r" id="right">
            <div class="wrapper">
                <button class="pin material-symbols-outlined" type="button" onclick="Aside.clear()" id="aside-r-button">chevron_right</button>
                {% block right %}
                {% endblock %}
            </div>
        </aside>
    </main>
</body>
</html>
