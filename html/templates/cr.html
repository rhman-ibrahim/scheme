{% load filters %}
<!DOCTYPE html>
<html lang="en">
<head>
    {% include "components/head.html" %}
    {% block head %}
    {% endblock %}
</head>
<body class="cr-grid" onload="Handler.init();" onresize="Handler.init();" data-app="{{ request.resolver_match.app_name }}" data-url="{{ request.resolver_match.url_name }}">
    {% include "components/messages.html" %}
    <main id="center">
        <nav class="aside-nav">
            <i class="pin material-symbols-outlined" id="right-open-icon" onclick="Aside.open('#right')">widgets</i>
        </nav>
        {% block center %}
        {% endblock %}
    </main>
    <aside id="right">
        <nav class="aside-nav">
            <i class="pin material-symbols-outlined" id="right-close-icon" onclick="Aside.clear()">chevron_right</i>
        </nav>
        {% block right %}
        {% endblock %}
    </aside>
    {% block fixed %}
    {% endblock %}
</body>
</html>
