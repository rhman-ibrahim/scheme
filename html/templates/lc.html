{% load filters %}
<!DOCTYPE html>
<html lang="en">
<head>
    {% include "components/head.html" %}
    {% block head %}
    {% endblock %}
</head>
<body onload="Handler.init();" onresize="Handler.init();" data-app="{{ request.resolver_match.app_name }}">
    <main data-url="{{ request.resolver_match.url_name }}" id="lc-grid">
        <section id="left">
            <div class="column">
                <button type="button" onclick="Fixed.clear()" class="material-icons column-button">close</button>
                {% block left %}
                {% endblock %}
            </div>
        </section>
        <section id="center">
            <div class="column">
                <button type="button" onclick="Fixed.open('#left')" class="material-icons column-button">{{ column.icon }}</button>
                {% block center %}
                {% endblock %}
            </div>
        </section>
    </main>
    {% include "components/messages.html" %}
    {% block fixed %}
    {% endblock %}
</body>
</html>
