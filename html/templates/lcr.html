{% extends 'templates/_.html' %}
{% block grid %}
<main id="lcr-grid">
    <section id="left">
        <div class="column">
            <button type="button" onclick="Fixed.clear()" class="column-button">
                <i class="material-icons">close</i>
            </button>
            {% block left %}
            {% endblock %}
        </div>
    </section>
    <section id="center">
        <div class="column">
            <button type="button" onclick="Fixed.open('#left')" class="column-button" id="lcr-left-button">
                <i class="material-icons">{{ template.icons.left }}</i>
            </button>
            <button type="button" onclick="Fixed.open('#right')" class="column-button" id="lcr-right-button">
                <i class="material-icons">{{ template.icons.right }}</i>
            </button>
            {% block center %}
            {% endblock %}
        </div>
    </section>
    <section id="right">
        <div class="column">
            <button type="button" onclick="Fixed.clear()" class="column-button">
                <i class="material-icons">close</i>
            </button>
            {% block right %}
            {% endblock %}
        </div>
    </section>
</main>
{% endblock %}
