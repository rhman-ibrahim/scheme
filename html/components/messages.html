{% load filters %}
{% for message in messages %}
<ul class="card message {{ message.tags }}">
    <li class="text-capitalize">
        <i class="material-icons">{{ message.tags|message_tag_icon }}</i>
        <span>{{ message }}</span>
    </li>
    <ul class="end">
        <li class="material-icons" onclick="Message.close(this)">close</li>
    </ul>
</ul>
{% endfor %}
