{% load filters %}

{% for message in messages %}
<header class="message" id="{{ message.tags }}-message-number-{{ forloop.counter }}">
    <h3 class="text-capitalize {{ message.tags|message:"color" }}">
        <i class="material-icons">{{ message.tags|message:"icon" }}</i>
        <span>{{ message.tags }}</span>
    </h3>
    <p>{{ message }}</p>
</header>
{% endfor %}
