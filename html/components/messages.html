{% load filters %}
{% for message in messages %}
<header class="message {{ message.tags }}" id="{{ message.tags }}-message-number-{{ forloop.counter }}">
    <h3 class="text-capitalize">
        <i class="material-icons">{{ message.tags|message_tag_icon }}</i>
        <span>{{ message.tags }}</span>
    </h3>
    <p>{{ message }}</p>
</header>
{% endfor %}
