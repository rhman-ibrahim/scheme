{% load filters %}

{% for message in messages %}
<header class="message {{ message.tags|message:"background" }}" id="{{ message.tags }}-message-number-{{ forloop.counter }}">
    <h3 class="text-capitalize">
        <i class="material-icons">{{ message.tags|message:"icon" }}</i>
        <span>{{ message.tags }}</span>
    </h3>
    <p>{{ message }}</p>
</header>
{% endfor %}
