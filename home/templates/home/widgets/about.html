{% load user_filters %}
<section class="widget" id="home-about-widget">
    <h2>
        <i class="material-icons">info</i>
        <span>About</span>
    </h2>
    <section class="flex-container">
        <div class="flex-box-col full-row" role="describe">
            <p>{{ about.me.about|safe }}</p>
            <ul class="text-align-right">
                <img src="{{ about.me.user|profile_picture_url }}" class="circle-24" alt="{{ request.user.username }}'s profile picture">
            </ul>
        </div>
        <div class="flex-box-col" role="describe">
            <p>Built with Django (Py) in its core. HTML, CSS and Js for the UI.</p>
            <ul class="text-align-right">
                <li class="material-symbols-outlined">code</li>
            </ul>
        </div>
    </section>
</section>
