<div class="card" role="function">
    <h3>theme</h3>
    <p>The theme settings follow your device mode configurations.
    Toggle between dark and light modes or set it to your device default.</p>
    <ul class="end">
        <li class="material-symbols-outlined" onclick="Theme.light()">light_mode</li>
        <li class="material-symbols-outlined" onclick="Theme.dark()">dark_mode</li>
        <li class="material-symbols-outlined" onclick="Theme.default()">contrast</li>
    </ul>
</div>
